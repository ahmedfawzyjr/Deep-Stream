syntax = "proto3";

package deepstream.results;

import "deepstream/common.proto";

option go_package = "deepstream/gateway/pkg/proto/results";

message InferenceResultEvent {
  string pipeline_id = 1;
  uint64 sequence = 2;
  int64 timestamp = 3;
  repeated deepstream.common.Detection detections = 4;
  int64 latency_ms = 5;
}

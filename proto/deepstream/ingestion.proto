syntax = "proto3";

package deepstream.ingestion;

import "deepstream/common.proto";

option go_package = "deepstream/gateway/pkg/proto/ingestion";

service IngestionService {
  rpc StreamVideo(stream VideoStreamRequest) returns (stream VideoStreamResponse);
  rpc StreamAudio(stream AudioStreamRequest) returns (stream AudioStreamResponse);
}

message VideoStreamRequest {
  string pipeline_id = 1;
  deepstream.common.VideoFrame frame = 2;
}

message VideoStreamResponse {
  uint64 sequence = 1;
  bool success = 2;
  string error_message = 3;
}

message AudioStreamRequest {
  string pipeline_id = 1;
  deepstream.common.AudioChunk chunk = 2;
}

message AudioStreamResponse {
  uint64 sequence = 1;
  bool success = 2;
  string error_message = 3;
}

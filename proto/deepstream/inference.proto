syntax = "proto3";

package deepstream.inference;

import "deepstream/common.proto";

option go_package = "deepstream/gateway/pkg/proto/inference";

service InferenceService {
  rpc ProcessVideo(VideoInferenceRequest) returns (VideoInferenceResponse);
}

message VideoInferenceRequest {
  string pipeline_id = 1;
  deepstream.common.VideoFrame frame = 2;
}

message VideoInferenceResponse {
  string pipeline_id = 1;
  uint64 sequence = 2;
  repeated deepstream.common.Detection detections = 3;
  int64 latency_ms = 4;
}

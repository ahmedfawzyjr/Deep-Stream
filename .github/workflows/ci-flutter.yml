name: CI Flutter (Mobile App)

on:
  push:
    branches: [ main ]
    paths:
      - 'mobile/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'mobile/**'

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: cd mobile && flutter pub get

      - name: Run analyzer
        run: cd mobile && flutter analyze

      - name: Run unit tests
        run: cd mobile && flutter test

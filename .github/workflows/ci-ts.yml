name: CI TypeScript (React Dashboard)

on:
  push:
    branches: [ main ]
    paths:
      - 'dashboard/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'dashboard/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-size: 18
          cache: 'npm'
          cache-dependency-path: dashboard/package.json

      - name: Install dependencies
        run: npm ci

      - name: Run build check
        run: npm run build

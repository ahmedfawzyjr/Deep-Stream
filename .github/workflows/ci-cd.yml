name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Code Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
          cache-dependency-path: api/go.sum

      - name: Install dependencies
        run: |
          cd api
          go mod download

      - name: Run Unit & Integration Tests
        run: |
          cd api
          go test -v -race -coverprofile=coverage.out ./...

      - name: Run SonarQube Scanner
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  security-scan:
    name: DevSecOps Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/ahmedfawzyjr/deepkick-api:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy-canary:
    name: Kubernetes Canary Deployment
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure Kubeconfig
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy Helm Chart Canary
        run: |
          helm upgrade --install deepkick-api-canary ./infrastructure/helm/deepkick-api \
            --namespace deepkick \
            --set image.tag=${{ github.sha }} \
            --set replicaCount=1 \
            --set ingress.hosts[0].host=canary.api.deepkick.local

      - name: Run Canary Smoke Tests
        run: |
          echo "Running API smoke tests..."
          curl -f http://canary.api.deepkick.local/health || exit 1

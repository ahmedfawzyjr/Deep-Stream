name: Model Retraining

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly at Sunday 00:00

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run retraining script
        run: |
          python -m pip install -r ml/requirements.txt || true
          python ml/src/training/trainer.py

name: CD Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Gateway Build
      - name: Build and Push Gateway
        uses: docker/build-push-action@v4
        with:
          context: gateway
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/deepstream-gateway:latest
            ghcr.io/${{ github.repository_owner }}/deepstream-gateway:${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64

      # Python API Build
      - name: Build and Push API
        uses: docker/build-push-action@v4
        with:
          context: api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/deepstream-api:latest
            ghcr.io/${{ github.repository_owner }}/deepstream-api:${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64

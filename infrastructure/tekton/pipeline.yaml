apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: deepstream-ci-cd-pipeline
  namespace: tekton-pipelines
spec:
  params:
    - name: git-url
      type: string
      default: "https://github.com/ahmedfawzyjr/Deep-Stream.git"
    - name: image-reference
      type: string
      default: "quay.io/deepstream/api-gateway:latest"
  workspaces:
    - name: shared-workspace
  tasks:
    - name: fetch-repository
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.git-url)
      workspaces:
        - name: output
          workspace: shared-workspace
    - name: run-unit-tests
      taskRef:
        name: golang-test
      runAfter:
        - fetch-repository
      workspaces:
        - name: source
          workspace: shared-workspace
    - name: build-and-push-image
      taskRef:
        name: kaniko
      runAfter:
        - run-unit-tests
      params:
        - name: IMAGE
          value: $(params.image-reference)
      workspaces:
        - name: source
          workspace: shared-workspace

replicaCount: 2

image:
  repository: ghcr.io/ahmedfawzyjr/deepkick-api
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: api.deepkick.local
      paths:
        - path: /
          pathType: Prefix

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 200m
    memory: 256Mi

env:
  postgresUrl: "postgresql://postgres:password@postgres-service:5432/deepkick"
  clickhouseHost: "clickhouse-service"
  clickhousePort: "9000"
  minioEndpoint: "minio-service:9000"
  jwtSecret: "super-secure-production-jwt-secret-key"

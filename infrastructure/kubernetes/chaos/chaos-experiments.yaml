apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: kill-kafka-broker
  namespace: deepkick
spec:
  action: pod-kill
  mode: fixed
  value: '1'
  selector:
    namespaces:
      - deepkick
    labelSelectors:
      'app': 'kafka'
  duration: '30s'
  scheduler:
    cron: '*/5 * * * *'
---
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: kill-redis-cache
  namespace: deepkick
spec:
  action: pod-kill
  mode: fixed
  value: '1'
  selector:
    namespaces:
      - deepkick
    labelSelectors:
      'app': 'redis'
  duration: '15s'
  scheduler:
    cron: '*/10 * * * *'
---
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: kill-api-service-pod
  namespace: deepkick
spec:
  action: pod-kill
  mode: random
  value: '50%'
  selector:
    namespaces:
      - deepkick
    labelSelectors:
      'app': 'deepkick-api'
  duration: '45s'
  scheduler:
    cron: '*/2 * * * *'

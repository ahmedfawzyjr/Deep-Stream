apiVersion: v1
kind: ConfigMap
metadata:
  name: deepkick-config
  namespace: deepkick
data:
  kafka.brokers: "deepkick-kafka:9092"
  redis.addr: "deepkick-redis:6379"
  postgres.url: "postgresql+asyncpg://postgres:password@deepkick-postgres:5432/deepkick"
  clickhouse.host: "deepkick-clickhouse"
  clickhouse.port: "8123"
  minio.endpoint: "deepkick-minio:9000"
  minio.secure: "false"


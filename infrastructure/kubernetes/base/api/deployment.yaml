apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: deepkick
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
        - name: api
          image: ghcr.io/ahmedfawzyjr/deepkick-api:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: POSTGRES_URL
              valueFrom:
                configMapKeyRef:
                  name: deepkick-config
                  key: postgres.url
            - name: CLICKHOUSE_HOST
              valueFrom:
                configMapKeyRef:
                  name: deepkick-config
                  key: clickhouse.host
            - name: CLICKHOUSE_PORT
              valueFrom:
                configMapKeyRef:
                  name: deepkick-config
                  key: clickhouse.port
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: deepkick-config
                  key: minio.endpoint
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: deepkick-secrets
                  key: jwt.secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: deepkick
spec:
  selector:
    app: api-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: LoadBalancer

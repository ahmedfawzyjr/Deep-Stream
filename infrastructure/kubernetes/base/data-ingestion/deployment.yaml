apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-ingestion-service
  namespace: deepkick
spec:
  replicas: 3
  selector:
    matchLabels:
      app: data-ingestion-service
  template:
    metadata:
      labels:
        app: data-ingestion-service
    spec:
      containers:
        - name: data-ingestion
          image: ghcr.io/ahmedfawzyjr/deepkick-data-ingestion:latest
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8080
              name: http-admin
          env:
            - name: GRPC_PORT
              value: "50051"
            - name: HTTP_PORT
              value: "8080"
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: deepkick-config
                  key: kafka.brokers
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: deepkick-config
                  key: redis.addr
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: deepkick-secrets
                  key: jwt.secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: data-ingestion-service
  namespace: deepkick
spec:
  selector:
    app: data-ingestion-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: http-admin
      port: 8080
      targetPort: 8080
  type: ClusterIP

version: '3.8'

services:
  # Relational Database: PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: deepstream-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deepstream
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Rust Inference Engine
  inference:
    build:
      context: ./inference
      dockerfile: Dockerfile
    container_name: deepstream-inference
    ports:
      - "50051:50051"
      - "2112:2112"
    environment:
      - MODEL_PATH=../models/match_predictor_v1.onnx
      - RUST_LOG=info
    volumes:
      - ./models:/models
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Go REST + WebSocket API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: deepstream-api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/deepstream?sslmode=disable
      - INFERENCE_ADDR=inference:50051
      - JWT_SECRET=super-secret-jwt-key-change-in-production
      - PORT=8080
      - ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      inference:
        condition: service_healthy

  # Prometheus: Metrics collection
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: deepstream-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - api
      - inference

  # Grafana: Metrics visualization dashboard
  grafana:
    image: grafana/grafana:9.5.2
    container_name: deepstream-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

  # Flask GenAI & Tactical Analysis Service
  api_flask:
    build:
      context: ./api_flask
      dockerfile: Dockerfile
    container_name: deepstream-api-flask
    ports:
      - "5001:5001"
    environment:
      - PORT=5001

  # Express.js Telemetry Gateway Proxy
  api_node:
    build:
      context: ./api_node
      dockerfile: Dockerfile
    container_name: deepstream-api-node
    ports:
      - "4000:4000"

  # Django Squad & Tactical Admin Portal
  admin_django:
    build:
      context: ./admin_django
      dockerfile: Dockerfile
    container_name: deepstream-admin-django
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
    depends_on:
      - postgres

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

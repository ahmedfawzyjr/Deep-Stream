version: '3.8'

services:
  # Message Queue: Kafka (KRaft mode)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: deepstream-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

  # Hot Tier Storage & Pub/Sub: Redis
  redis:
    image: redis:7.0-alpine
    container_name: deepstream-redis
    ports:
      - "6379:6379"

  # Warm Tier DB: PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: deepstream-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: deepstream

  # Cold Tier DB: ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:23.3
    container_name: deepstream-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"

  # Object / Archive Storage: MinIO
  minio:
    image: minio/minio:RELEASE.2023-05-18T00-12-52Z
    container_name: deepstream-minio
    ports:
      - "9001:9001"
      - "9005:9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
